<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>蔵書管理システム - 一覧</title>
    <style>
        body { font-family: 'MS PGothic', sans-serif; margin: 20px; background-color: #fff; color: #333; line-height: 1.6; }
        h1 { border-bottom: 3px solid #333; padding-bottom: 5px; margin-bottom: 25px; }
        .section-box { border: 1px solid #999; padding: 15px; margin-bottom: 25px; border-radius: 4px; background-color: #fafafa; }
        .section-title { font-weight: bold; margin-bottom: 15px; display: block; border-left: 6px solid #0056b3; padding-left: 10px; font-size: 1.1em; }
        .form-inline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input[type="text"], select { padding: 8px; border: 1px solid #ccc; border-radius: 3px; }
        .btn { padding: 8px 16px; cursor: pointer; border: 1px solid #666; border-radius: 3px; font-weight: bold; transition: 0.2s; }
        .btn-blue { background-color: #e7f1ff; color: #0056b3; border-color: #0056b3; }
        .btn-blue:hover { background-color: #0056b3; color: white; }
        .btn-green { background-color: #28a745; color: white; border: none; }
        .btn-red { background-color: #dc3545; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; background: white; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: left; vertical-align: middle; }
        th { background-color: #f2f2f2; font-size: 0.9em; }
        .img-thumb { width: 60px; height: 85px; object-fit: contain; border: 1px solid #eee; background: #fff; }
        .count-area { display: flex; align-items: center; gap: 10px; }
        .count-num { font-size: 1.2em; font-weight: bold; color: #0056b3; }
        .btn-plus { background: #6c757d; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
    </style>
</head>
<body>

    <h1>[ わたしの個人図書館 ]</h1>

    <div class="section-box">
        <span class="section-title">▼ ISBNでクイック登録</span>
        <div class="form-inline">
            <input type="text" id="isbnInput" placeholder="ISBN番号（13桁）を入力" style="width: 250px;">
            <button class="btn btn-blue" onclick="registerBook()">Googleで検索して登録</button>
        </div>
    </div>

    <div class="section-box">
        <span class="section-title">▼ 蔵書をさがす</span>
        <div class="form-inline">
            <input type="text" id="searchInput" placeholder="タイトル・著者名を入力" value="{{ search_query or '' }}" style="width: 250px;">
            <select id="genreSelect">
                <option value="">ジャンル: 全て</option>
                <option value="技術書">技術書</option>
                <option value="小説">小説</option>
            </select>
            <button class="btn btn-blue" onclick="searchBooks()">検索実行</button>
            <button class="btn" onclick="location.href='/books'" style="font-size: 0.8em;">クリア</button>
        </div>
    </div>

    <div class="section-box">
        <span class="section-title">【 登録済み書籍一覧 】</span>
        <table>
            <thead>
                <tr>
                    <th style="width: 70px;">表紙</th>
                    <th>タイトル / 著者</th>
                    <th style="width: 150px;">保管場所</th>
                    <th style="width: 100px;">読了</th>
                    <th style="width: 130px;">操作</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr>
                    <td><img src="{{ book.thumbnail }}" class="img-thumb"></td>
                    <td>
                        <b>{{ book.title }}</b><br>
                        <small>著者: {{ book.authors }}</small>
                    </td>
                    <td>
                        <input type="text" id="loc-{{ book.id }}" value="{{ book.location }}" style="width: 90%;">
                    </td>
                    <td>
                        <div class="count-area">
                            <span class="count-num" id="display-count-{{ book.id }}">{{ book.read_count }}</span>
                            <button class="btn-plus" onclick="quickIncrement({{ book.id }}, {{ book.read_count }})">＋1</button>
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <button class="btn btn-green" onclick="updateBook({{ book.id }})" style="padding: 4px; font-size: 0.85em;">更新</button>
                            <button class="btn btn-red" onclick="deleteBook({{ book.id }})" style="padding: 4px; font-size: 0.85em;">削除</button>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        async function registerBook() {
    const isbnInput = document.getElementById('isbnInput');
    // 全角数字を半角に変換する処理を追加
    let isbn = isbnInput.value.replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
    }).replace(/[-ー]/g, ''); // ハイフンも消去

    if (!isbn || isbn.length < 10) { 
        alert("有効なISBNを半角数字で入力してください"); 
        return; 
    }

    try {
        const response = await fetch('/register/' + isbn);
        
        // 500エラーなどの場合、JSONではない可能性があるのでテキストで受ける
        const text = await response.text();
        let data;
        try {
            data = JSON.parse(text);
        } catch(e) {
            // JSONでなければサーバーエラーのテキストを表示
            alert("サーバーでエラーが発生しました。ISBNが正しいか確認してください。");
            return;
        }

        const msg = data.message || data.detail || "予期せぬレスポンスです";
        alert(msg);

        if (response.ok) {
            location.reload();
        }
    } catch (error) {
        console.error("Error details:", error);
        alert("通信エラーが発生しました。");
    }
}

        function searchBooks() {
            const keyword = document.getElementById('searchInput').value;
            location.href = keyword ? '/books?q=' + encodeURIComponent(keyword) : '/books';
        }

        async function quickIncrement(id, currentCount) {
            const loc = document.getElementById('loc-' + id).value;
            await fetch(`/update/${id}?location=${encodeURIComponent(loc)}&read_count=${currentCount + 1}`, { method: 'PUT' });
            location.reload();
        }

        async function updateBook(id) {
            const loc = document.getElementById('loc-' + id).value;
            const count = document.getElementById('display-count-' + id).innerText;
            await fetch(`/update/${id}?location=${encodeURIComponent(loc)}&read_count=${count}`, { method: 'PUT' });
            alert("更新しました");
            location.reload();
        }

        async function deleteBook(id) {
            if (!confirm("削除しますか？")) return;
            await fetch('/delete/' + id, { method: 'DELETE' });
            location.reload();
        }

        document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchBooks(); });
    </script>
</body>
</html>
